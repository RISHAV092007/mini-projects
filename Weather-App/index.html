<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>🌤 Weather App</h1>

        <input type="text" id="input" placeholder="Enter City Name">

        <button id="search">Search</button>

        <div id="weatherCard" class="hidden">

            <h2 id="city"></h2>

            <img id="icon" src="" alt="">

            <h3 id="temp"></h3>

            <p id="condition"></p>

            <div class="details">
                <p><strong>Humidity:</strong> <span id="humidity"></span>%</p>
                <p><strong>Wind:</strong> <span id="wind"></span> m/s</p>
                <p><strong>Pressure:</strong> <span id="pressure"></span> hPa</p>
                <p><strong>Feels Like:</strong> <span id="feels"></span> °C</p>
            </div>

        </div>

        <p id="error"></p>

    </div>

    <script src="script.js"></script>

</body>
</html>
